name: "PyTorch Ambassador Program Feedback & Ideas"
description: "Share feedback, suggestions, or ideas related to the PyTorch Ambassador Program."
title: "[Ambassador Feedback] <Brief Idea or Topic>"
labels: ["ambassador-feedback", "pending-review"]
assignees:
  - reginankenchor

body:
  - type: markdown
    attributes:
      value: |
        > 📝 **Title Instructions:** Please replace only `<Brief Idea or Topic>` in the issue title above with a short summary of your feedback or idea.

  - type: markdown
    attributes:
      value: |
        # 💡 PyTorch Ambassador Program Feedback & Ideas

        Thank you for helping improve the **PyTorch Ambassador Program**.

        This form is intended specifically for:
        - Ambassador Program feedback
        - Community improvement ideas
        - Program operations suggestions
        - Ambassador experience recommendations
        - Events, onboarding, mentorship, or engagement ideas

        Please provide as much context and detail as possible to help us better review your suggestion.

  - type: input
    id: feedback-title
    attributes:
      label: "Brief Summary"
      description: "Provide a short summary of your feedback or idea."
      placeholder: "Example: Improve onboarding process for new ambassadors"
    validations:
      required: true

  - type: dropdown
    id: feedback-category
    attributes:
      label: "Which area of the Ambassador Program does this relate to?"
      options:
        - Ambassador Onboarding
        - Community Engagement
        - Events & Workshops
        - Educational Resources
        - Mentorship
        - Communications
        - Regional Community Growth
        - Ambassador Operations
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: other-category
    attributes:
      label: "If 'Other' was selected, please specify"
      placeholder: "Describe the category"

  - type: textarea
    id: idea-description
    attributes:
      label: "Describe Your Feedback or Idea"
      description: |
        Explain:
        - the current challenge or opportunity
        - your proposed improvement
        - why this change would be valuable
        - any implementation suggestions or examples

        Include links or references if applicable.
      placeholder: "Provide as much detail as possible..."
      render: markdown
    validations:
      required: true

  - type: checkboxes
    id: benefits
    attributes:
      label: "What benefits could this idea provide?"
      options:
        - label: "Improves ambassador experience"
        - label: "Strengthens community engagement"
        - label: "Supports contributor growth"
        - label: "Improves onboarding or mentorship"
        - label: "Enhances educational initiatives"
        - label: "Improves program operations"
        - label: "Supports regional community growth"
        - label: "Other"

  - type: textarea
    id: implementation-notes
    attributes:
      label: "Implementation Suggestions (Optional)"
      description: "Share any ideas, examples, workflows, or recommendations for implementing this suggestion."
      placeholder: "Optional implementation details..."

  - type: textarea
    id: additional-comments
    attributes:
      label: "Additional Comments (Optional)"
      placeholder: "Any extra details, links, references, or supporting context?"

  - type: markdown
    attributes:
      value: |
        ## 🗳️ Review Process

        Once submitted:

        - The PyTorch Ambassador Program team will review your feedback or idea.
        - Additional questions or clarification requests may be shared through issue comments.
        - Suggestions may be discussed internally before implementation or follow-up.

        Thank you for helping improve the PyTorch Ambassador Program community 🧡
