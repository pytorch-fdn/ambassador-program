name: Delete Ambassador Closure Comments 2026

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode? (no comments will be deleted)"
        required: false
        default: "true"

jobs:
  delete-comments:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Delete premature closure comments
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          script: |
            const { owner, repo } = context.repo;
            const dryRun = core.getInput("dry_run") === "true";
            const targetLabel = "ambassador-nomination-2026";
            const targetText =
              "Applications and nominations for the 2026 PyTorch Foundation Ambassador Program are now closed.";

            const perPage = 100;
            let page = 1;
            let deletedCount = 0;
            let matchedCount = 0;

            core.info(`Dry run mode: ${dryRun}`);
            core.info(`Target label: ${targetLabel}`);
            core.info(`Target comment text: ${targetText}`);

            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: "all",
                per_page: perPage,
                page,
              });

              if (issues.length === 0) {
                core.info("No more issues found.");
                break;
              }

              for (const issue of issues) {
                if (issue.pull_request) {
                  continue;
                }

                const hasTargetLabel = issue.labels.some(
                  (label) => label.name === targetLabel
                );

                if (!hasTargetLabel) {
                  continue;
                }

                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issue.number,
                  per_page: perPage,
                });

                for (const comment of comments) {
                  const isGitHubActionsBot =
                    comment.user?.login === "github-actions[bot]";

                  const hasTargetText =
                    comment.body && comment.body.includes(targetText);

                  if (!isGitHubActionsBot || !hasTargetText) {
                    continue;
                  }

                  matchedCount += 1;

                  core.info(
                    `Matched comment ${comment.id} on issue #${issue.number}: ${issue.title}`
                  );

                  if (!dryRun) {
                    await github.rest.issues.deleteComment({
                      owner,
                      repo,
                      comment_id: comment.id,
                    });

                    deletedCount += 1;

                    core.info(
                      `Deleted comment ${comment.id} on issue #${issue.number}`
                    );
                  }
                }
              }

              page += 1;
            }

            core.info(`Matched comments: ${matchedCount}`);
            core.info(`Deleted comments: ${deletedCount}`);
