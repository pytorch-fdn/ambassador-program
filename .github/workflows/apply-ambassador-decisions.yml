name: Apply Ambassador Decisions 2026

on:
  workflow_dispatch:
    inputs:
      private_repo:
        description: "Private repo containing the CSV, example: pytorch-fdn/ambassador-program-management"
        required: true
        default: "pytorch-fdn/ambassador-program-management"
        type: string

      private_ref:
        description: "Branch, tag, or SHA of the private repo"
        required: true
        default: "main"
        type: string

      csv_path:
        description: "Path to CSV inside the private repo"
        required: true
        default: "ambassador/ambassador_decisions_2026.csv"
        type: string

      dry_run:
        description: "Preview only? No comments or labels will be added."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  issues: write

jobs:
  apply-decisions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo containing CSV
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.private_repo }}
          ref: ${{ inputs.private_ref }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private-src

      - name: Apply decisions from CSV
        uses: actions/github-script@v7
        env:
          CSV_PATH: ${{ github.workspace }}/private-src/${{ inputs.csv_path }}
        with:
          script: |
            const fs = require("fs");

            const { owner, repo } = context.repo;
            const csvPath = process.env.CSV_PATH;
            const dryRun = core.getInput("dry_run") === "true";

            const ACCEPTED_LABEL = "accepted-2026";
            const NOT_SELECTED_LABEL = "not-selected-2026";

            core.info(`Dry run: ${dryRun}`);
            core.info(`Reading CSV from: ${csvPath}`);

            if (!fs.existsSync(csvPath)) {
              core.setFailed(`CSV file not found at: ${csvPath}`);
              return;
            }

            function parseCSV(text) {
              const lines = text.trim().split(/\r?\n/);

              if (lines.length < 2) {
                throw new Error("CSV must include a header row and at least one data row.");
              }

              const headers = lines[0].split(",").map(h => h.trim());

              return lines.slice(1).map(line => {
                const values = line.split(",").map(v => v.trim());
                const row = {};

                headers.forEach((header, index) => {
                  row[header] = values[index] || "";
                });

                return row;
              });
            }

            async function ensureLabel(name, color) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name,
                });
              } catch (error) {
                if (error.status === 404) {
                  if (dryRun) {
                    core.info(`DRY RUN: Would create label ${name}`);
                    return;
                  }

                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                  });

                  core.info(`Created label: ${name}`);
                } else {
                  throw error;
                }
              }
            }

            async function issueExists(issueNumber) {
              try {
                await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                });

                return true;
              } catch (error) {
                if (error.status === 404) return false;
                throw error;
              }
            }

            async function commentAndLabel(issueNumber, commentBody, labelName) {
              if (dryRun) {
                core.info(`DRY RUN: Would comment on issue #${issueNumber}`);
                core.info(`DRY RUN: Would add label ${labelName} to issue #${issueNumber}`);
                core.info(commentBody);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentBody,
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [labelName],
              });

              core.info(`Commented and labeled issue #${issueNumber}`);
            }

            await ensureLabel(ACCEPTED_LABEL, "2ea44f");
            await ensureLabel(NOT_SELECTED_LABEL, "d73a4a");

            const csvText = fs.readFileSync(csvPath, "utf8");
            const rows = parseCSV(csvText);

            let processed = 0;

            for (const row of rows) {
              const issueNumber = Number(row["Submission ID"]);
              const candidateName = row["Candidate"] || row["Name"] || "there";
              const decision = (row["Decision"] || "").trim().toLowerCase();

              if (!issueNumber) {
                core.info("Skipping row with missing or invalid Submission ID.");
                continue;
              }

              const exists = await issueExists(issueNumber);

              if (!exists) {
                core.info(`Issue #${issueNumber} not found. Skipping.`);
                continue;
              }

              if (decision === "accepted" || decision === "accept") {
                const message = [
                  `Hello ${candidateName},`,
                  "",
                  "Congratulations! We are excited to inform you that you have been selected as a 2026 PyTorch Foundation Ambassador.",
                  "",
                  "Your contributions, impact, and commitment to the PyTorch Foundation ecosystem stood out during the review process.",
                  "",
                  "Next steps and onboarding information will be shared separately.",
                  "",
                  "Best regards,",
                  "The PyTorch Foundation Ambassador Program Team"
                ].join("\n");

                await commentAndLabel(issueNumber, message, ACCEPTED_LABEL);
                processed += 1;
              } else if (
                decision === "not selected" ||
                decision === "not-selected" ||
                decision === "not_selected"
              ) {
                const message = [
                  `Hello ${candidateName},`,
                  "",
                  "Thank you for applying to the 2026 PyTorch Foundation Ambassador Program.",
                  "",
                  "After careful consideration, your application was not selected for this cycle.",
                  "",
                  "We truly appreciate your time, effort, and contributions to the PyTorch Foundation community, and we encourage you to stay involved and apply again in a future cycle.",
                  "",
                  "If you have any questions, please contact ambassadors@pytorch.org.",
                  "",
                  "Best regards,",
                  "The PyTorch Foundation Ambassador Program Team"
                ].join("\n");

                await commentAndLabel(issueNumber, message, NOT_SELECTED_LABEL);
                processed += 1;
              } else {
                core.info(`Unknown decision "${row["Decision"]}" for issue #${issueNumber}. Skipping.`);
              }
            }

            core.info(`Processed ${processed}/${rows.length} rows.`);
