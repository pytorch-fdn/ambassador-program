name: Auto-Comment on Ambassador Issues

on:
  issues:
    types: [opened]

jobs:
  comment-on-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Add Comment Based on Issue Type
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name.toLowerCase());
            const issueNumber = issue.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            let commentBody = "";

            if (labels.includes("ambassador-nomination")) {
              commentBody = [
                "👋 Thank you for submitting a nomination for the **PyTorch Ambassador Program**!",
                "",
                "Your nomination has been received and is currently under review.",
                "",
                "A team member will review the submission and follow up if additional information is needed.",
                "",
                "Thank you for helping grow the PyTorch community! 🚀"
              ].join("\n\n");

            } else if (labels.includes("ambassador-profile-update")) {
              commentBody = [
                "👋 Thank you for submitting an ambassador profile update request.",
                "",
                "Your request has been received and will be reviewed.",
                "",
                "If you are updating your profile photo, please make sure the image is attached to this issue and that you have confirmed permission for it to appear publicly on the PyTorch Ambassador website.",
                "",
                "Thank you for helping us keep the Ambassador directory up to date!"
              ].join("\n\n");

            } else {
              commentBody = [
                "👋 Thank you for your submission to the **PyTorch Ambassador Program** repository.",
                "",
                "Your issue has been received and will be reviewed.",
                "",
                "Thank you for supporting the PyTorch community!"
              ].join("\n\n");
            }

            await github.rest.issues.createComment({
              owner: repoOwner,
              repo: repoName,
              issue_number: issueNumber,
              body: commentBody
            });
